<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Eco-Acoustic Mesh — Ranger Dashboard for anti-poaching sentinel network">
    <meta name="theme-color" content="#0a0f1c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>EcoMesh Ranger Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header id="app-header">
        <div class="header-left">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <div>
                <h1>EcoMesh</h1>
                <span class="header-subtitle">Ranger Dashboard</span>
            </div>
        </div>
        <div class="header-right">
            <div class="connection-status" id="connection-status">
                <span class="status-dot"></span>
                <span class="status-text">Connecting...</span>
            </div>
        </div>
    </header>

    <!-- Navigation Tabs -->
    <nav id="tab-nav">
        <button class="tab-btn active" data-tab="map">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/></svg>
            Map
        </button>
        <button class="tab-btn" data-tab="alerts">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            Alerts
            <span class="badge" id="alert-badge" style="display:none">0</span>
        </button>
        <button class="tab-btn" data-tab="nodes">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            Nodes
        </button>
    </nav>

    <!-- Tab Content -->
    <main id="content">
        <!-- Map Tab -->
        <section class="tab-panel active" id="panel-map">
            <div id="map"></div>
            <div class="map-overlay" id="map-overlay" style="display:none">
                <div class="overlay-card">
                    <div class="overlay-header">
                        <span class="threat-icon" id="overlay-icon"></span>
                        <span class="threat-label" id="overlay-label"></span>
                        <button class="overlay-close" id="overlay-close">&times;</button>
                    </div>
                    <div class="overlay-body" id="overlay-body"></div>
                </div>
            </div>
        </section>

        <!-- Alerts Tab -->
        <section class="tab-panel" id="panel-alerts">
            <div class="alerts-header">
                <h2>Recent Alerts</h2>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="threats">Threats Only</button>
                </div>
            </div>
            <div class="alert-list" id="alert-list">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>
                    <p>No alerts yet. Waiting for sentinel data...</p>
                </div>
            </div>
        </section>

        <!-- Nodes Tab -->
        <section class="tab-panel" id="panel-nodes">
            <h2 class="section-title">Sentinel Nodes</h2>
            <div class="nodes-grid" id="nodes-grid">
                <div class="empty-state">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
                    <p>No nodes reporting. Start a sentinel or simulator.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast container -->
    <div id="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
